  name: Build Deutsch APK
  on:
    push:
      paths:
        - 'deutsch-app/**'
        - 'verben/**'
        - '.github/workflows/build-apk.yml'
    workflow_dispatch:
  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
        - uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'
            cache-dependency-path: deutsch-app/package-lock.json
        - uses: gradle/actions/setup-gradle@v4
        - uses: android-actions/setup-android@v3
        - working-directory: deutsch-app
          run: npm ci
        - working-directory: deutsch-app
          run: npm run cap:sync
        - working-directory: deutsch-app/android
          run: chmod +x gradlew && ./gradlew assembleDebug
        - uses: actions/upload-artifact@v4
          with:
            name: Deutsch-debug-apk
            path: deutsch-app/android/app/build/outputs/apk/debug/app-debug.apk
            retention-days: 30
